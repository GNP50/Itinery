spring:
  application:
    name: travel-itinerary-monolith
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/itinerary_db}
    username: ${SPRING_DATASOURCE_USERNAME:travel}
    password: ${SPRING_DATASOURCE_PASSWORD:travel_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true  # Migrations managed by Flyway (V1__initial_schema_consolidated.sql)
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 2000ms
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
    consumer:
      group-id: travel-itinerary-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# Transactional Outbox Pattern Configuration
outbox:
  enabled: true
  publisher:
    fixed-delay-ms: 500

server:
  port: 8080

grpc:
  server:
    port: ${GRPC_PORT:9095}
  client:
    saga-service:
      address: ${GRPC_CLIENT_SAGA_SERVICE_ADDRESS:static://localhost:9096}
      negotiation-type: plaintext
      enable-keep-alive: true
      keep-alive-time: 30s
      keep-alive-timeout: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

itinerary:
  queue:
    max-concurrent: ${QUEUE_MAX_CONCURRENT:3}
    max-queue-size: ${QUEUE_MAX_SIZE:100}
    poll-interval-ms: ${QUEUE_POLL_INTERVAL:1000}
    # Set to true when the Saga Orchestrator drives processing via Kafka workers.
    # When enabled, QueueManager's scheduler is a no-op (no double-processing).
    saga-enabled: ${SAGA_ENABLED:true}

photon:
  base-url: ${PHOTON_BASE_URL:https://photon.komoot.io}

osrm:
  base-url: ${OSRM_BASE_URL:https://router.project-osrm.org}

overpass:
  base-url: ${OVERPASS_BASE_URL:https://overpass-api.de/api/interpreter}

ollama:
  base-url: ${OLLAMA_BASE_URL:}
  cloud-url: ${OLLAMA_CLOUD_URL:https://api.ollama.com}
  api-key: ${OLLAMA_API_KEY:}
  model: ${OLLAMA_MODEL:qwen2.5-coder:latest}
  timeout-seconds: ${OLLAMA_TIMEOUT:60}

ai:
  mock-chat: ${MOCK_AI_CHAT:false}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:travel-itinerary}

resilience4j:
  ratelimiter:
    instances:
      photon:
        limit-for-period: 5
        limit-refresh-period: 1s
        timeout-duration: 5s
  circuitbreaker:
    instances:
      osrm:
        sliding-window-size: 10
        failure-rate-threshold: 30
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 3
      ollama:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 60s
      overpass:
        sliding-window-size: 10
        failure-rate-threshold: 40
        wait-duration-in-open-state: 30s
  retry:
    instances:
      photon:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - com.travel.itinerary.impl.exception.ExternalServiceException
      osrm:
        max-attempts: 3
        wait-duration: 1s
      ollama:
        max-attempts: 2
        wait-duration: 2s
      overpass:
        max-attempts: 3
        wait-duration: 1s

logging:
  level:
    com.travel: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

config:
  client:
    enabled: false

# JWT signing key (base64-encoded 256-bit value).
# If absent a random key is generated at startup (local dev only).
jwt:
  secret: ${JWT_SECRET:vDAxPktURFFC5xZBrlNQzD4zrkKqHyxjXR/MZMYGZkU=}

# Queue Management Configuration
queue:
  max-size: ${QUEUE_MAX_SIZE:1000}
  rate-limit:
    # Conservative limits that protect against abuse while maintaining good UX
    anonymous: ${QUEUE_RATE_LIMIT_ANONYMOUS:5}        # 5 requests per hour
    registered: ${QUEUE_RATE_LIMIT_REGISTERED:20}    # 20 requests per hour
    admin: ${QUEUE_RATE_LIMIT_ADMIN:100}             # 100 requests per hour
    window-seconds: ${QUEUE_RATE_LIMIT_WINDOW:3600}  # 1 hour window

# Saga Orchestration Configuration
saga:
  max-concurrent: ${SAGA_MAX_CONCURRENT:5}           # Max parallel processing sagas
  poll-interval-ms: ${SAGA_POLL_INTERVAL:5000}      # Check for pending sagas every 5s
