# ==============================================================================
# Travel Itinerary Platform – Microservices Stack
# ==============================================================================
#
# Runs the platform in distributed microservice mode. Each domain service runs
# independently. Cross-domain access uses gRPC clients rather than direct DB
# reads, following the hexagonal/ports-and-adapters pattern.
#
# Quick start:
#   docker compose -f docker-compose.microservices.yml up -d --build
#
# Services:
#   Infrastructure  : postgres, redis, kafka, kafka-ui, minio
#   Platform        : config-manager (:8082), file-manager (:8083),
#                     monitoring-service (:8084), saga-orchestrator (:8086 HTTP, :9096 gRPC)
#   Domain Services : itinerary-service (:8085 HTTP, :8087 actuator)
#                     user-service (:8088 HTTP, :9094 gRPC)
#                     ai-service (:8089 HTTP, :9095 gRPC)
#
# Port map (host → container):
#   3000 → frontend (nginx)
#   ── Domain Services ──
#   8085 → itinerary HTTP         8087 → itinerary actuator
#   8088 → user-service HTTP      9094 → user-service gRPC
#   8089 → ai-service HTTP        9095 → ai-service gRPC
#   ── Platform Services ──
#   8082 → config-manager HTTP    9091 → config-manager gRPC
#   8083 → file-manager HTTP      9093 → file-manager gRPC
#   8084 → monitoring HTTP        9090 → monitoring gRPC
#   8086 → saga-orchestrator HTTP 9096 → saga-orchestrator gRPC
#   ── Infrastructure ──
#   8090 → kafka-ui               9000/9001 → minio
#   5432 → postgres               6379 → redis
#   9092/29092 → kafka
# ==============================================================================

name: travel-micro

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"

x-all-depends: &all-healthy
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  kafka:
    condition: service_healthy
  minio:
    condition: service_healthy
  config-manager:
    condition: service_healthy
  file-manager:
    condition: service_healthy
  monitoring-service:
    condition: service_healthy
  saga-orchestrator:
    condition: service_healthy
  user-service:
    condition: service_healthy

networks:
  travel-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  minio-data:

services:

  # ── PostgreSQL / PostGIS ──────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: travel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: travel
      POSTGRES_PASSWORD: travel_secret
      POSTGRES_DB: itinerary_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
      - ./docker/postgres/02-init-itinerary-schema.sql:/docker-entrypoint-initdb.d/02-init-itinerary-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel -d itinerary_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - travel-net
    logging: *default-logging

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: travel-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass redis_secret
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfilename appendonly.aof
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-net
    logging: *default-logging

  # ── Apache Kafka 3.7 (KRaft mode) ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: travel-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - travel-net
    logging: *default-logging

  # ── Kafka UI ──────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: travel-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: travel-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_READONLY: "false"
      SERVER_PORT: 8090
    ports:
      - "8090:8090"
    networks:
      - travel-net
    logging: *default-logging

  # ── MinIO ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: travel-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio_secret_key
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - travel-net
    logging: *default-logging

  # ── Config Manager ────────────────────────────────────────────────────────
  config-manager:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODULE: config-manager
        SKIP_TESTS: "true"
      cache_from:
        - com.travel/config-manager:dev
      # BuildKit inline cache for better layer reuse
      x-bake:
        cache-from: type=local,src=/tmp/docker-cache
        cache-to: type=local,dest=/tmp/docker-cache,mode=max
    image: com.travel/config-manager:dev
    container_name: travel-config-manager
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/config_db
      DB_USERNAME: travel_app
      DB_PASSWORD: travel_app_secret
      # JVM options - use memory percentage for container-aware sizing
      JAVA_OPTS: >-
        -XX:+UseZGC
        -XX:+ZGenerational
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/logs/heap-dump.hprof
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8082:8081"   # HTTP REST
      - "9091:9091"   # gRPC
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - travel-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  # ── File Manager ──────────────────────────────────────────────────────────
  file-manager:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODULE: file-manager
        SKIP_TESTS: "true"
      cache_from:
        - com.travel/file-manager:dev
      # BuildKit inline cache for better layer reuse
      x-bake:
        cache-from: type=local,src=/tmp/docker-cache
        cache-to: type=local,dest=/tmp/docker-cache,mode=max
    image: com.travel/file-manager:dev
    container_name: travel-file-manager
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minio_secret_key
      MINIO_BUCKET: travel-itinerary
      # JVM options - use memory percentage for container-aware sizing
      JAVA_OPTS: >-
        -XX:+UseZGC
        -XX:+ZGenerational
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/logs/heap-dump.hprof
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8083:8083"   # HTTP REST
      - "9093:9093"   # gRPC
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - travel-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Monitoring Service ────────────────────────────────────────────────────
  monitoring-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODULE: monitoring-service
        SKIP_TESTS: "true"
      cache_from:
        - com.travel/monitoring-service:dev
      # BuildKit inline cache for better layer reuse
      x-bake:
        cache-from: type=local,src=/tmp/docker-cache
        cache-to: type=local,dest=/tmp/docker-cache,mode=max
    image: com.travel/monitoring-service:dev
    container_name: travel-monitoring-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MONITORING_STRATEGY: console
      DATADOG_API_KEY: ${DATADOG_API_KEY:-}
      # JVM options - use memory percentage for container-aware sizing
      JAVA_OPTS: >-
        -XX:+UseZGC
        -XX:+ZGenerational
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/logs/heap-dump.hprof
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8084:8084"   # HTTP REST
      - "9090:9090"   # gRPC
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - travel-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  # ── SAGA Orchestrator ─────────────────────────────────────────────────────
  saga-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODULE: event-saga-orchestrator
        SKIP_TESTS: "true"
      cache_from:
        - com.travel/saga-orchestrator:dev
      # BuildKit inline cache for better layer reuse
      x-bake:
        cache-from: type=local,src=/tmp/docker-cache
        cache-to: type=local,dest=/tmp/docker-cache,mode=max
    image: com.travel/saga-orchestrator:dev
    container_name: travel-saga-orchestrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      MANAGEMENT_PORT: 8080
      GRPC_SERVER_PORT: 9096
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/saga_db
      SPRING_DATASOURCE_USERNAME: travel_app
      SPRING_DATASOURCE_PASSWORD: travel_app_secret
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: redis_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # JVM options - use memory percentage for container-aware sizing
      JAVA_OPTS: >-
        -XX:+UseZGC
        -XX:+ZGenerational
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/logs/heap-dump.hprof
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8086:8080"   # HTTP (host 8086 → container 8080)
      - "9096:9096"   # gRPC SagaService
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - travel-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G

  # ── User Domain Service ───────────────────────────────────────────────────
  # Exposes gRPC :9094 for user lookups and admin-status checks.
  # HTTP :8088 is actuator-only. Schema is owned by itinerary-service (Flyway).
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODULE: app-microservice-user
        SKIP_TESTS: "true"
      cache_from:
        - com.travel/user-service:dev
      # BuildKit inline cache for better layer reuse
      x-bake:
        cache-from: type=local,src=/tmp/docker-cache
        cache-to: type=local,dest=/tmp/docker-cache,mode=max
    image: com.travel/user-service:dev
    container_name: travel-user-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8088
      GRPC_SERVER_PORT: 9094
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/itinerary_db
      SPRING_DATASOURCE_USERNAME: travel
      SPRING_DATASOURCE_PASSWORD: travel_secret
      JAVA_OPTS: >-
        -XX:+UseZGC
        -XX:+ZGenerational
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/logs/heap-dump.hprof
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8088:8088"   # HTTP actuator
      - "9094:9094"   # gRPC UserService
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - travel-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Frontend ──────────────────────────────────────────────────────────────
  # React SPA served by nginx; proxies /api/ → itinerary-service:8085
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      cache_from:
        - com.travel/frontend:dev
      # BuildKit inline cache for better layer reuse
      x-bake:
        cache-from: type=local,src=/tmp/docker-cache
        cache-to: type=local,dest=/tmp/docker-cache,mode=max
    image: com.travel/frontend:dev
    container_name: travel-frontend
    restart: unless-stopped
    depends_on:
      itinerary-service:
        condition: service_healthy
    volumes:
      - ./docker/nginx/nginx.microservices.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    networks:
      - travel-net
    logging: *default-logging

  # ── Itinerary Domain Service ──────────────────────────────────────────────
  # Itinerary domain microservice (HTTP :8085, actuator :8087)
  # Connects to user-service via gRPC and ai-service for AI features
  itinerary-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODULE: app-microservice-itinerary
        SKIP_TESTS: "true"
      cache_from:
        - com.travel/itinerary-service:dev
      # BuildKit inline cache for better layer reuse
      x-bake:
        cache-from: type=local,src=/tmp/docker-cache
        cache-to: type=local,dest=/tmp/docker-cache,mode=max
    image: com.travel/itinerary-service:dev
    container_name: travel-itinerary-service
    restart: unless-stopped
    depends_on:
      <<: *all-healthy
      ai-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8085
      MANAGEMENT_SERVER_PORT: 8087
      MANAGEMENT_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/itinerary_db
      SPRING_DATASOURCE_USERNAME: travel
      SPRING_DATASOURCE_PASSWORD: travel_secret
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redis_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minio_secret_key
      MINIO_BUCKET_ITINERARIES: itinerary-assets
      # AI service connection
      GRPC_CLIENT_AI_SERVICE_ADDRESS: static://ai-service:9095
      GRPC_CLIENT_AI_SERVICE_NEGOTIATION_TYPE: plaintext
      # User service connection
      GRPC_CLIENT_USER_SERVICE_ADDRESS: static://user-service:9094
      GRPC_CLIENT_USER_SERVICE_NEGOTIATION_TYPE: plaintext
      # Saga service connection (for admin saga lifecycle queries)
      GRPC_CLIENT_SAGA_SERVICE_ADDRESS: static://saga-orchestrator:9096
      GRPC_CLIENT_SAGA_SERVICE_NEGOTIATION_TYPE: plaintext
      # AI configuration
      MOCK_AI_CHAT: "true"
      OLLAMA_CLOUD_URL: ${OLLAMA_CLOUD_URL:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      # JVM options - use memory percentage for container-aware sizing
      JAVA_OPTS: >-
        -XX:+UseZGC
        -XX:+ZGenerational
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/logs/heap-dump.hprof
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8085:8085"   # HTTP API
      - "8087:8087"   # Spring Actuator
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8087/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - travel-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G

  # ── AI Service ────────────────────────────────────────────────────────────
  # AI domain microservice (HTTP :8089 actuator, gRPC :9095)
  # Provides AI-powered suggestions, chat, route optimization via Ollama
  # Connects to user-service for user context enrichment
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODULE: app-microservice-ai
        SKIP_TESTS: "true"
      cache_from:
        - com.travel/ai-service:dev
      # BuildKit inline cache for better layer reuse
      x-bake:
        cache-from: type=local,src=/tmp/docker-cache
        cache-to: type=local,dest=/tmp/docker-cache,mode=max
    image: com.travel/ai-service:dev
    container_name: travel-ai-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      user-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8089
      GRPC_SERVER_PORT: 9095
      # User service connection
      GRPC_CLIENT_USER_SERVICE_ADDRESS: static://user-service:9094
      GRPC_CLIENT_USER_SERVICE_NEGOTIATION_TYPE: plaintext
      # Ollama AI configuration
      OLLAMA_CLOUD_URL: ${OLLAMA_CLOUD_URL:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      MOCK_AI_CHAT: "true"
      # Kafka configuration
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # JVM options - use memory percentage for container-aware sizing
      JAVA_OPTS: >-
        -XX:+UseZGC
        -XX:+ZGenerational
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/logs/heap-dump.hprof
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8089:8089"   # HTTP actuator
      - "9095:9095"   # gRPC
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8089/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - travel-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
