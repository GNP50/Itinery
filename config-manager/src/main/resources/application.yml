server:
  port: 8081

spring:
  application:
    name: config-manager

  datasource:
    url: jdbc:postgresql://localhost:5432/config_db
    username: ${DB_USERNAME:config_user}
    password: ${DB_PASSWORD:config_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: config-manager-pool

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

# ── gRPC Server ────────────────────────────────────────────────────────────────
grpc:
  server:
    port: 9091
    security:
      enabled: false              # Enable TLS in production via environment override

# ── SpringDoc / Swagger UI ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# ── Actuator ───────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ────────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.travel.config: DEBUG
    org.flywaydb: INFO
    org.hibernate.SQL: WARN
