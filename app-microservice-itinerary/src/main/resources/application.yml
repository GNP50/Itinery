spring:
  application:
    name: itinerary-microservice
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/itinerary_db}
    username: ${SPRING_DATASOURCE_USERNAME:travel}
    password: ${SPRING_DATASOURCE_PASSWORD:travel_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: itinerary-microservice-group
      auto-offset-reset: earliest

server:
  port: 8085

grpc:
  client:
    saga-service:
      address: ${GRPC_CLIENT_SAGA_SERVICE_ADDRESS:static://localhost:9096}
      negotiation-type: plaintext
      enable-keep-alive: true
      keep-alive-time: 30s
      keep-alive-timeout: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

itinerary:
  queue:
    max-concurrent: ${QUEUE_MAX_CONCURRENT:3}
    max-queue-size: ${QUEUE_MAX_SIZE:100}
    poll-interval-ms: ${QUEUE_POLL_INTERVAL:1000}

photon:
  base-url: ${PHOTON_BASE_URL:https://photon.komoot.io}

osrm:
  base-url: ${OSRM_BASE_URL:https://router.project-osrm.org}

overpass:
  base-url: ${OVERPASS_BASE_URL:https://overpass-api.de/api/interpreter}

ollama:
  base-url: ${OLLAMA_BASE_URL:}
  cloud-url: ${OLLAMA_CLOUD_URL:}
  model: ${OLLAMA_MODEL:llama3.1:8b}
  timeout-seconds: ${OLLAMA_TIMEOUT:30}

ai:
  mock-chat: ${MOCK_AI_CHAT:false}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:travel-itinerary}

# JWT signing key (base64-encoded 256-bit value).
# If absent a random key is generated at startup (local dev only).
jwt:
  secret: ${JWT_SECRET:vDAxPktURFFC5xZBrlNQzD4zrkKqHyxjXR/MZMYGZkU=}
