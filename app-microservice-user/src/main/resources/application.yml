spring:
  application:
    name: travel-user-microservice

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/itinerary_db}
    username: ${SPRING_DATASOURCE_USERNAME:travel}
    password: ${SPRING_DATASOURCE_PASSWORD:travel_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    # Schema is owned by the monolith (Flyway). No DDL changes here.
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway is disabled – the monolith's Flyway manages all schema migrations.
  flyway:
    enabled: false

# ── gRPC server ───────────────────────────────────────────────────────────────
grpc:
  server:
    port: ${GRPC_SERVER_PORT:9091}

# ── HTTP server (actuator only) ───────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.travel: INFO
    org.hibernate.SQL: WARN

# JWT Secret - Must match the value used by monolith and itinerary microservice
jwt:
  secret: ${JWT_SECRET:vDAxPktURFFC5xZBrlNQzD4zrkKqHyxjXR/MZMYGZkU=}
