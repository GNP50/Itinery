# ==============================================================================
# Travel Itinerary Platform – Monolith Stack
# ==============================================================================
#
# Runs the full platform as a single monolithic application together with all
# supporting platform services and infrastructure.
#
# Quick start:
#   docker compose -f docker-compose.monolith.yml up -d --build
#
# Services:
#   Infrastructure  : postgres, redis, kafka, kafka-ui, minio
#   Platform        : config-manager (:8082), file-manager (:8083),
#                     monitoring-service (:8084), saga-orchestrator (:8086)
#   Application     : backend/monolith (:8080)
#
# Port map (host → container):
#   3000 → frontend (nginx)
#   8080 → monolith HTTP          8081 → monolith actuator    9095 → monolith gRPC
#   8082 → config-manager HTTP    9091 → config-manager gRPC
#   8083 → file-manager HTTP      9093 → file-manager gRPC
#   8084 → monitoring HTTP        9090 → monitoring gRPC
#   8086 → saga-orchestrator HTTP 9096 → saga-orchestrator gRPC
#   8090 → kafka-ui               9000/9001 → minio
#   5432 → postgres               6380 → redis
#   9092/29092 → kafka
# ==============================================================================

name: travel-monolith

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"

x-all-depends: &all-healthy
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  kafka:
    condition: service_healthy
  minio:
    condition: service_healthy
  config-manager:
    condition: service_healthy
  file-manager:
    condition: service_healthy
  monitoring-service:
    condition: service_healthy
  saga-orchestrator:
    condition: service_healthy

networks:
  travel-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  minio-data:

services:

  # ── PostgreSQL / PostGIS ──────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: travel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: travel
      POSTGRES_PASSWORD: travel_secret
      POSTGRES_DB: itinerary_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel -d itinerary_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - travel-net
    logging: *default-logging

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: travel-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass redis_secret
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfilename appendonly.aof
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 320M
    networks:
      - travel-net
    logging: *default-logging

  # ── Apache Kafka 3.7 (KRaft mode) ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: travel-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_HEAP_OPTS: "-Xmx400m -Xms200m"
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 640M
    networks:
      - travel-net
    logging: *default-logging

  # ── Kafka UI ──────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: travel-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: travel-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_READONLY: "false"
      SERVER_PORT: 8090
    ports:
      - "8090:8090"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - travel-net
    logging: *default-logging

  # ── MinIO ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: travel-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio_secret_key
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - travel-net
    logging: *default-logging

  # ── Config Manager ────────────────────────────────────────────────────────
  # Distributed configuration service (HTTP :8081, gRPC :9091)
  # Exposed on host :8082 to avoid collision with the monolith's actuator (:8081)
  config-manager:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODULE: config-manager
        SKIP_TESTS: "true"
      cache_from:
        - com.travel/config-manager:dev
      # BuildKit inline cache for better layer reuse
      x-bake:
        cache-from: type=local,src=/tmp/docker-cache
        cache-to: type=local,dest=/tmp/docker-cache,mode=max
    image: com.travel/config-manager:dev
    container_name: travel-config-manager
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/config_db
      DB_USERNAME: travel_app
      DB_PASSWORD: travel_app_secret
      # JVM options - use memory percentage for container-aware sizing
      JAVA_OPTS: >-
        -XX:+UseZGC
        -XX:+ZGenerational
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/logs/heap-dump.hprof
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8082:8081"   # HTTP REST
      - "9091:9091"   # gRPC
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - travel-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  # ── File Manager ──────────────────────────────────────────────────────────
  # S3-compatible file storage proxy (HTTP :8083, gRPC :9093)
  file-manager:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODULE: file-manager
        SKIP_TESTS: "true"
      cache_from:
        - com.travel/file-manager:dev
      # BuildKit inline cache for better layer reuse
      x-bake:
        cache-from: type=local,src=/tmp/docker-cache
        cache-to: type=local,dest=/tmp/docker-cache,mode=max
    image: com.travel/file-manager:dev
    container_name: travel-file-manager
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minio_secret_key
      MINIO_BUCKET: travel-itinerary
      # JVM options - use memory percentage for container-aware sizing
      JAVA_OPTS: >-
        -XX:+UseZGC
        -XX:+ZGenerational
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/logs/heap-dump.hprof
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8083:8083"   # HTTP REST
      - "9093:9093"   # gRPC
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - travel-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Monitoring Service ────────────────────────────────────────────────────
  # Observability / metrics service (HTTP :8084, gRPC :9090)
  monitoring-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODULE: monitoring-service
        SKIP_TESTS: "true"
      cache_from:
        - com.travel/monitoring-service:dev
      # BuildKit inline cache for better layer reuse
      x-bake:
        cache-from: type=local,src=/tmp/docker-cache
        cache-to: type=local,dest=/tmp/docker-cache,mode=max
    image: com.travel/monitoring-service:dev
    container_name: travel-monitoring-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MONITORING_STRATEGY: console    # use "datadog" and set DATADOG_API_KEY for production
      DATADOG_API_KEY: ${DATADOG_API_KEY:-}
      # JVM options - use memory percentage for container-aware sizing
      JAVA_OPTS: >-
        -XX:+UseZGC
        -XX:+ZGenerational
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/logs/heap-dump.hprof
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8084:8084"   # HTTP REST
      - "9090:9090"   # gRPC
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - travel-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  # ── SAGA Orchestrator ─────────────────────────────────────────────────────
  # Distributed saga / state-machine service (HTTP :8080 → host :8086, gRPC :9096)
  saga-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODULE: event-saga-orchestrator
        SKIP_TESTS: "true"
      cache_from:
        - com.travel/saga-orchestrator:dev
      # BuildKit inline cache for better layer reuse
      x-bake:
        cache-from: type=local,src=/tmp/docker-cache
        cache-to: type=local,dest=/tmp/docker-cache,mode=max
    image: com.travel/saga-orchestrator:dev
    container_name: travel-saga-orchestrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      # No separate management port — actuator shares HTTP port
      MANAGEMENT_PORT: 8080
      GRPC_SERVER_PORT: 9096
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/saga_db
      SPRING_DATASOURCE_USERNAME: travel_app
      SPRING_DATASOURCE_PASSWORD: travel_app_secret
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: redis_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # JVM options - use memory percentage for container-aware sizing
      JAVA_OPTS: >-
        -XX:+UseZGC
        -XX:+ZGenerational
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/logs/heap-dump.hprof
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8086:8080"   # HTTP (host 8086 → container 8080)
      - "9096:9096"   # gRPC SagaService
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - travel-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Frontend ──────────────────────────────────────────────────────────────
  # React SPA served by nginx; proxies /api/ → backend:8080
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      cache_from:
        - com.travel/frontend:dev
      # BuildKit inline cache for better layer reuse
      x-bake:
        cache-from: type=local,src=/tmp/docker-cache
        cache-to: type=local,dest=/tmp/docker-cache,mode=max
    image: com.travel/frontend:dev
    container_name: travel-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - travel-net
    logging: *default-logging

  # ── Monolith Backend ──────────────────────────────────────────────────────
  # All domains in a single fat-jar (HTTP :8080, actuator :8081, gRPC :9095)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODULE: app-monolith
        SKIP_TESTS: "true"
      cache_from:
        - com.travel/app-monolith:dev
      # BuildKit inline cache for better layer reuse
      x-bake:
        cache-from: type=local,src=/tmp/docker-cache
        cache-to: type=local,dest=/tmp/docker-cache,mode=max
    image: com.travel/app-monolith:dev
    container_name: travel-backend
    restart: unless-stopped
    depends_on:
      <<: *all-healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/itinerary_db
      SPRING_DATASOURCE_USERNAME: travel
      SPRING_DATASOURCE_PASSWORD: travel_secret
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redis_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minio_secret_key
      MINIO_BUCKET_ITINERARIES: itinerary-assets
      GRPC_PORT: "9090"
      # Saga service connection (for admin saga lifecycle queries)
      GRPC_CLIENT_SAGA_SERVICE_ADDRESS: static://saga-orchestrator:9096
      GRPC_CLIENT_SAGA_SERVICE_NEGOTIATION_TYPE: plaintext
      MOCK_AI_CHAT: "true"
      OLLAMA_CLOUD_URL: ${OLLAMA_CLOUD_URL:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      JAVA_OPTS: >-
        -XX:+UseZGC
        -XX:+ZGenerational
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/logs/heap-dump.hprof
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8080:8080"   # HTTP API
      - "8081:8081"   # Spring Actuator
      - "9095:9090"   # gRPC (host 9095 — 9090 is taken by monitoring-service)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - travel-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G
