spring:
  application:
    name: monitoring-service
  servlet:
    multipart:
      enabled: false
  jackson:
    time-format: ISO8601
  main:
    web-application-type: servlet

server:
  port: 8084
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

monitoring:
  strategy: ${MONITORING_STRATEGY:console}
  datadog:
    api-key: ${DATADOG_API_KEY:}
    site: datadoghq.com
    enabled: true
    host: localhost
    port: 8126
  telemetry:
    enabled: true
    include-headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true

logging:
  level:
    root: INFO
    com.travel.monitoring: DEBUG
    org.springframework.web: INFO
    io.grpc: WARN

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    doc-expansion: list

grpc:
  server:
    port: 9090
