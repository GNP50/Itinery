spring:
  application:
    name: ai-microservice

server:
  port: ${SERVER_PORT:8089}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9095}

ai:
  ollama:
    url: ${OLLAMA_CLOUD_URL:}
    api-key: ${OLLAMA_API_KEY:}
    model: llama3.1:8b
    mock: ${MOCK_AI_CHAT:true}

spring.kafka:
  bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

logging:
  level:
    com.travel.ai: INFO
    net.devh.boot.grpc: INFO
